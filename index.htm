
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результаты предсказаний</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
        }
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
        }
        .header h2 {
            margin: 0;
            color: #333;
            font-size: 1.5rem;
        }
        .date {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .prediction-item {
            margin-bottom: 1rem;
        }
        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: 500;
            color: #444;
        }
        .bar-container {
            background-color: #e9ecef;
            border-radius: 4px;
            height: 10px;
            overflow: hidden;
        }
        .bar {
            height: 100%;
            border-radius: 4px;
            background-color: #4CAF50; /* Зеленый цвет для успеха */
            transition: width 0.5s ease-in-out;
        }
        /* Выделяем топ-1 результат */
        .top-prediction .bar {
            background-color: #2196F3; /* Синий для лидера */
        }
        .top-prediction .label-row {
            color: #2196F3;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Предсказание 2 -->
    <div class="prediction-item">

        <div class="bar-container">

        </div>
    </div>
</div>

</body>
